name: HRMS Complete Test Pipeline

on:
  push:
    branches: ['*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '20'

# ═══════════════════════════════════════════════════════════════════════════════
# Pipeline Flow:
#
#   Stage 1: automation-tests (Frontend Flow Test Cases — 136 cases)
#       ↓ must pass
#   Stage 2: integration-tests (E2E Employee-to-Attendance — 10 cases)
#       ↓ must pass
#   Stage 3: backend-compile-check (TypeScript + Prisma)
#       ↓ must pass
#   Stage 4: backend-unit-tests (Jest)
#       ↓ must pass
#   Stage 5: frontend-build-check (Vite production build)
#       ↓ must pass
#   Stage 6: final-report (Combined report from all stages)
#
# ═══════════════════════════════════════════════════════════════════════════════

jobs:

  # ─────────────────────────────────────────────────────────────────────────────
  # STAGE 1 — AUTOMATION TESTS
  # Runs HRMS_FRONTEND_FLOW_TEST_CASES.js
  # Validates: 136 test cases across 12 sections (Login, Employee CRUD,
  # Bulk Upload, Shift, Leave, Approval, Attendance, RBAC)
  # ─────────────────────────────────────────────────────────────────────────────
  automation-tests:
    name: "Stage 1 — Automation Tests (136 cases)"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # ── 1A: Execute test case file ──────────────────────────────────────────
      - name: "1A: Run Frontend Flow Test Cases"
        run: node docs/HRMS_FRONTEND_FLOW_TEST_CASES.js

      # ── 1B: Validate every test case has required fields ────────────────────
      - name: "1B: Validate required fields (id, title, role, steps, expected)"
        run: |
          node -e "
          const tc = require('./docs/HRMS_FRONTEND_FLOW_TEST_CASES.js');
          let errors = 0;
          let total = 0;

          tc.sections.forEach(section => {
            section.cases.forEach(c => {
              total++;
              const missing = [];
              if (!c.id) missing.push('id');
              if (!c.title) missing.push('title');
              if (!c.role && !c.roles) missing.push('role');
              if (!c.steps || c.steps.length === 0) missing.push('steps');
              if (!c.expected || c.expected.length === 0) missing.push('expected');
              if (missing.length > 0) {
                console.error('FAIL: ' + c.id + ' (' + c.title + ') — missing: ' + missing.join(', '));
                errors++;
              }
            });
          });

          console.log('Validated ' + total + ' test cases');
          if (errors > 0) {
            console.error(errors + ' test case(s) have missing required fields');
            process.exit(1);
          }
          console.log('PASS: All test cases have required fields');
          "

      # ── 1C: Verify no duplicate test case IDs ──────────────────────────────
      - name: "1C: Verify test case ID uniqueness"
        run: |
          node -e "
          const tc = require('./docs/HRMS_FRONTEND_FLOW_TEST_CASES.js');
          const ids = new Set();
          const duplicates = [];

          tc.sections.forEach(section => {
            section.cases.forEach(c => {
              if (ids.has(c.id)) duplicates.push(c.id);
              ids.add(c.id);
            });
          });

          if (duplicates.length > 0) {
            console.error('FAIL: Duplicate test case IDs: ' + duplicates.join(', '));
            process.exit(1);
          }
          console.log('PASS: All ' + ids.size + ' test case IDs are unique');
          "

      # ── 1D: Verify declared section counts match actual ─────────────────────
      - name: "1D: Verify section counts match actual cases"
        run: |
          node -e "
          const tc = require('./docs/HRMS_FRONTEND_FLOW_TEST_CASES.js');
          let errors = 0;

          tc.sections.forEach(section => {
            if (section.cases.length !== section.count) {
              console.error('FAIL: ' + section.id + ' declared ' + section.count + ' but has ' + section.cases.length);
              errors++;
            }
          });

          if (errors > 0) process.exit(1);
          console.log('PASS: All ' + tc.sections.length + ' section counts match');
          "

      # ── 1E: Verify all 12 required sections exist ──────────────────────────
      - name: "1E: Verify all 12 workflow sections are present"
        run: |
          node -e "
          const tc = require('./docs/HRMS_FRONTEND_FLOW_TEST_CASES.js');
          const requiredSections = [
            'TC-1', 'TC-2', 'TC-3', 'TC-4', 'TC-5', 'TC-6',
            'TC-7', 'TC-8', 'TC-9', 'TC-10', 'TC-11', 'TC-12'
          ];
          const found = tc.sections.map(s => s.id);
          const missing = requiredSections.filter(r => !found.includes(r));

          if (missing.length > 0) {
            console.error('FAIL: Missing sections: ' + missing.join(', '));
            process.exit(1);
          }
          console.log('PASS: All 12 required sections present — ' + found.join(', '));
          "

      # ── 1F: Verify RBAC coverage across all 4 roles ────────────────────────
      - name: "1F: Verify all 4 roles are covered in test cases"
        run: |
          node -e "
          const tc = require('./docs/HRMS_FRONTEND_FLOW_TEST_CASES.js');
          const roles = new Set();

          tc.sections.forEach(s => s.cases.forEach(c => {
            if (c.role) roles.add(c.role);
            if (c.roles) c.roles.forEach(r => roles.add(r));
          }));

          const requiredRoles = ['SUPER_ADMIN', 'HR_MANAGER', 'MANAGER', 'EMPLOYEE'];
          const missing = requiredRoles.filter(r => !roles.has(r));

          if (missing.length > 0) {
            console.error('FAIL: Missing role coverage: ' + missing.join(', '));
            process.exit(1);
          }
          console.log('PASS: All 4 roles covered — ' + [...roles].join(', '));
          "

  # ─────────────────────────────────────────────────────────────────────────────
  # STAGE 2 — INTEGRATION TESTS
  # Runs HRMS_E2E_EMPLOYEE_TO_ATTENDANCE_TESTS.js
  # Validates: 5 positive + 5 negative cases, 46 steps, 188 validations
  # Covers complete workflow: Employee Create → Shift → Leave → Attendance
  # ─────────────────────────────────────────────────────────────────────────────
  integration-tests:
    name: "Stage 2 — Integration Tests (10 E2E cases)"
    runs-on: ubuntu-latest
    needs: automation-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # ── 2A: Execute E2E workflow test file ──────────────────────────────────
      - name: "2A: Run E2E Employee-to-Attendance Workflow Tests"
        run: node docs/HRMS_E2E_EMPLOYEE_TO_ATTENDANCE_TESTS.js

      # ── 2B: Validate exactly 5 positive + 5 negative ───────────────────────
      - name: "2B: Validate test count (5 positive + 5 negative)"
        run: |
          node -e "
          const e2e = require('./docs/HRMS_E2E_EMPLOYEE_TO_ATTENDANCE_TESTS.js');
          let errors = 0;

          if (e2e.positiveTests.length !== 5) {
            console.error('FAIL: Expected 5 positive, found ' + e2e.positiveTests.length);
            errors++;
          }
          if (e2e.negativeTests.length !== 5) {
            console.error('FAIL: Expected 5 negative, found ' + e2e.negativeTests.length);
            errors++;
          }

          if (errors > 0) process.exit(1);
          console.log('PASS: 5 positive + 5 negative = 10 total');
          "

      # ── 2C: Validate every step has action, expectedResult, validate ────────
      - name: "2C: Validate step structure (action + expectedResult + validate[])"
        run: |
          node -e "
          const e2e = require('./docs/HRMS_E2E_EMPLOYEE_TO_ATTENDANCE_TESTS.js');
          let errors = 0;
          let totalSteps = 0;
          let totalValidations = 0;

          const all = [...e2e.positiveTests, ...e2e.negativeTests];
          all.forEach(t => {
            if (!t.id || !t.title || !t.description || !t.flow) {
              console.error('FAIL: ' + (t.id || 'UNKNOWN') + ' missing id/title/description/flow');
              errors++;
            }
            if (!t.steps || t.steps.length === 0) {
              console.error('FAIL: ' + t.id + ' has no steps');
              errors++;
              return;
            }
            t.steps.forEach(s => {
              totalSteps++;
              totalValidations += (s.validate ? s.validate.length : 0);
              const missing = [];
              if (!s.seq && s.seq !== 0) missing.push('seq');
              if (!s.action) missing.push('action');
              if (!s.expectedResult) missing.push('expectedResult');
              if (!s.validate || s.validate.length === 0) missing.push('validate[]');
              if (typeof s.page === 'undefined' && typeof s.apiCall === 'undefined') missing.push('page or apiCall');
              if (missing.length > 0) {
                console.error('FAIL: ' + t.id + ' step ' + s.seq + ' missing: ' + missing.join(', '));
                errors++;
              }
            });
          });

          if (errors > 0) {
            console.error(errors + ' structural error(s)');
            process.exit(1);
          }
          console.log('PASS: ' + totalSteps + ' steps, ' + totalValidations + ' validations — all properly structured');
          "

      # ── 2D: Verify no duplicate test IDs across positive + negative ─────────
      - name: "2D: Verify E2E test ID uniqueness"
        run: |
          node -e "
          const e2e = require('./docs/HRMS_E2E_EMPLOYEE_TO_ATTENDANCE_TESTS.js');
          const all = [...e2e.positiveTests, ...e2e.negativeTests];
          const ids = new Set(all.map(t => t.id));

          if (ids.size !== all.length) {
            console.error('FAIL: Duplicate E2E test IDs found');
            process.exit(1);
          }
          console.log('PASS: All ' + ids.size + ' E2E test IDs are unique');
          "

      # ── 2E: Verify positive tests follow correct workflow sequence ──────────
      - name: "2E: Verify positive workflow sequence (Create → Shift → Leave → Approve → Attendance)"
        run: |
          node -e "
          const e2e = require('./docs/HRMS_E2E_EMPLOYEE_TO_ATTENDANCE_TESTS.js');
          const pos = e2e.positiveTests;
          let errors = 0;

          const expectedFlow = [
            { id: 'POS-1', mustContain: 'Employee Creation' },
            { id: 'POS-2', mustContain: 'Shift' },
            { id: 'POS-3', mustContain: 'Leave' },
            { id: 'POS-4', mustContain: 'Approv' },
            { id: 'POS-5', mustContain: 'Attendance' },
          ];

          expectedFlow.forEach((exp, i) => {
            if (!pos[i]) {
              console.error('FAIL: Missing test at position ' + i);
              errors++;
              return;
            }
            if (pos[i].id !== exp.id) {
              console.error('FAIL: Expected ' + exp.id + ' at position ' + i + ', found ' + pos[i].id);
              errors++;
            }
            if (!pos[i].title.includes(exp.mustContain)) {
              console.error('FAIL: ' + pos[i].id + ' title does not contain \"' + exp.mustContain + '\"');
              errors++;
            }
          });

          if (errors > 0) process.exit(1);
          console.log('PASS: Positive tests follow correct workflow sequence');
          console.log('  POS-1: Employee Creation');
          console.log('  POS-2: Shift Assignment');
          console.log('  POS-3: Leave Configuration');
          console.log('  POS-4: Leave Apply + Manager Approval');
          console.log('  POS-5: Attendance Verification');
          "

      # ── 2F: Verify negative tests cover all failure categories ──────────────
      - name: "2F: Verify negative tests cover all failure categories"
        run: |
          node -e "
          const e2e = require('./docs/HRMS_E2E_EMPLOYEE_TO_ATTENDANCE_TESTS.js');
          const neg = e2e.negativeTests;
          let errors = 0;

          const requiredCategories = [
            { id: 'NEG-1', category: 'Validation Failure' },
            { id: 'NEG-2', category: 'RBAC / Unauthorized Access' },
            { id: 'NEG-3', category: 'Leave Application Failure' },
            { id: 'NEG-4', category: 'Missing Shift / Config' },
            { id: 'NEG-5', category: 'Attendance Anomaly' },
          ];

          requiredCategories.forEach((exp, i) => {
            if (!neg[i]) {
              console.error('FAIL: Missing negative test at position ' + i);
              errors++;
              return;
            }
            if (neg[i].id !== exp.id) {
              console.error('FAIL: Expected ' + exp.id + ' at position ' + i + ', found ' + neg[i].id);
              errors++;
            }
          });

          if (errors > 0) process.exit(1);
          console.log('PASS: All 5 negative failure categories covered');
          requiredCategories.forEach(c => console.log('  ' + c.id + ': ' + c.category));
          "

      # ── 2G: Verify API endpoint references are valid ───────────────────────
      - name: "2G: Verify API endpoint references in test steps"
        run: |
          node -e "
          const e2e = require('./docs/HRMS_E2E_EMPLOYEE_TO_ATTENDANCE_TESTS.js');
          const validPrefixes = [
            'POST /api/v1/', 'GET /api/v1/', 'PUT /api/v1/', 'DELETE /api/v1/',
            'NONE', 'null'
          ];
          let errors = 0;
          let apiSteps = 0;
          let noApiSteps = 0;

          const all = [...e2e.positiveTests, ...e2e.negativeTests];
          all.forEach(t => {
            t.steps.forEach(s => {
              if (!s.apiCall || s.apiCall === 'NONE' || s.apiCall.startsWith('NONE')) {
                noApiSteps++;
                return;
              }
              apiSteps++;
              const hasValid = validPrefixes.some(p => s.apiCall.startsWith(p));
              if (!hasValid) {
                console.error('FAIL: ' + t.id + ' step ' + s.seq + ' invalid apiCall: ' + s.apiCall);
                errors++;
              }
            });
          });

          if (errors > 0) process.exit(1);
          console.log('PASS: ' + apiSteps + ' API steps valid, ' + noApiSteps + ' frontend-only steps');
          "

  # ─────────────────────────────────────────────────────────────────────────────
  # STAGE 3 — BACKEND COMPILE CHECK
  # Runs TypeScript compilation and Prisma client generation
  # Ensures backend code compiles without errors
  # ─────────────────────────────────────────────────────────────────────────────
  backend-compile-check:
    name: "Stage 3 — Backend Compile Check"
    runs-on: ubuntu-latest
    needs: integration-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: "3A: Install backend dependencies"
        working-directory: backend
        run: npm ci

      - name: "3B: Generate Prisma client"
        working-directory: backend
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: "3C: TypeScript compile check (tsc --noEmit)"
        working-directory: backend
        run: npx tsc --noEmit

      - name: "3D: Build backend (dist output)"
        working-directory: backend
        run: npm run build

  # ─────────────────────────────────────────────────────────────────────────────
  # STAGE 4 — BACKEND UNIT TESTS
  # Runs Jest test suite with coverage
  # ─────────────────────────────────────────────────────────────────────────────
  backend-unit-tests:
    name: "Stage 4 — Backend Unit Tests (Jest)"
    runs-on: ubuntu-latest
    needs: backend-compile-check

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: "4A: Install backend dependencies"
        working-directory: backend
        run: npm ci

      - name: "4B: Generate Prisma client"
        working-directory: backend
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: "4C: Run Jest test suite"
        working-directory: backend
        run: npm test -- --passWithNoTests --forceExit --verbose
        env:
          NODE_ENV: test
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          REDIS_URL: ${{ secrets.REDIS_URL }}

  # ─────────────────────────────────────────────────────────────────────────────
  # STAGE 5 — FRONTEND BUILD CHECK
  # Installs dependencies and runs Vite production build
  # Ensures frontend compiles without TypeScript or build errors
  # ─────────────────────────────────────────────────────────────────────────────
  frontend-build-check:
    name: "Stage 5 — Frontend Build Check (Vite)"
    runs-on: ubuntu-latest
    needs: backend-unit-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: "5A: Install frontend dependencies"
        working-directory: frontend
        run: npm ci

      - name: "5B: Build frontend (Vite production)"
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_APP_NAME: 'HRMS Portal 2026'
          VITE_APP_VERSION: '1.0.0'

      - name: "5C: Verify build output exists"
        run: |
          if [ -d "frontend/dist" ] && [ -f "frontend/dist/index.html" ]; then
            echo "PASS: frontend/dist/index.html exists"
            FILE_COUNT=$(find frontend/dist -type f | wc -l)
            echo "PASS: $FILE_COUNT files in build output"
          else
            echo "FAIL: frontend/dist/index.html not found"
            exit 1
          fi

  # ─────────────────────────────────────────────────────────────────────────────
  # STAGE 6 — FINAL COMBINED REPORT
  # Generates a combined summary from all stages
  # Runs even if earlier stages fail (if: always) to report what passed/failed
  # ─────────────────────────────────────────────────────────────────────────────
  final-report:
    name: "Stage 6 — Final Pipeline Report"
    runs-on: ubuntu-latest
    needs: [automation-tests, integration-tests, backend-compile-check, backend-unit-tests, frontend-build-check]
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: "6A: Generate combined test pipeline report"
        env:
          STAGE1_RESULT: ${{ needs.automation-tests.result }}
          STAGE2_RESULT: ${{ needs.integration-tests.result }}
          STAGE3_RESULT: ${{ needs.backend-compile-check.result }}
          STAGE4_RESULT: ${{ needs.backend-unit-tests.result }}
          STAGE5_RESULT: ${{ needs.frontend-build-check.result }}
        run: |
          node -e "
          const tc = require('./docs/HRMS_FRONTEND_FLOW_TEST_CASES.js');
          const e2e = require('./docs/HRMS_E2E_EMPLOYEE_TO_ATTENDANCE_TESTS.js');

          const automationCases = tc.sections.reduce((s, sec) => s + sec.count, 0);
          const automationSteps = tc.sections.reduce((s, sec) =>
            s + sec.cases.reduce((ss, c) => ss + (c.steps ? c.steps.length : 0), 0), 0);

          const e2eCases = e2e.positiveTests.length + e2e.negativeTests.length;
          const e2eSteps = [...e2e.positiveTests, ...e2e.negativeTests]
            .reduce((s, t) => s + t.steps.length, 0);
          const e2eValidations = [...e2e.positiveTests, ...e2e.negativeTests]
            .reduce((s, t) => s + t.steps.reduce((ss, st) => ss + st.validate.length, 0), 0);

          const s1 = process.env.STAGE1_RESULT;
          const s2 = process.env.STAGE2_RESULT;
          const s3 = process.env.STAGE3_RESULT;
          const s4 = process.env.STAGE4_RESULT;
          const s5 = process.env.STAGE5_RESULT;

          const icon = (r) => r === 'success' ? 'PASS' : r === 'skipped' ? 'SKIP' : 'FAIL';
          const allPassed = [s1, s2, s3, s4, s5].every(r => r === 'success');

          const d = '='.repeat(72);
          const l = '-'.repeat(72);

          console.log(d);
          console.log('  HRMS COMPLETE TEST PIPELINE — FINAL REPORT');
          console.log(d);
          console.log('  Organization : ' + tc.organization.name);
          console.log('  Branch       : ' + (process.env.GITHUB_REF_NAME || 'local'));
          console.log('  Commit       : ' + (process.env.GITHUB_SHA || 'local').substring(0, 8));
          console.log(l);
          console.log('');
          console.log('  STAGE RESULTS:');
          console.log(l);
          console.log('  [' + icon(s1) + ']  Stage 1 — Automation Tests       ' + automationCases + ' cases / ' + automationSteps + ' steps');
          console.log('  [' + icon(s2) + ']  Stage 2 — Integration Tests      ' + e2eCases + ' cases / ' + e2eSteps + ' steps / ' + e2eValidations + ' validations');
          console.log('  [' + icon(s3) + ']  Stage 3 — Backend Compile Check  TypeScript + Prisma + Build');
          console.log('  [' + icon(s4) + ']  Stage 4 — Backend Unit Tests     Jest with coverage');
          console.log('  [' + icon(s5) + ']  Stage 5 — Frontend Build Check   Vite production build');
          console.log(l);
          console.log('');
          console.log('  AUTOMATION TEST BREAKDOWN (Stage 1):');
          console.log(l);
          tc.sections.forEach(s => {
            console.log('    ' + s.id.padEnd(8) + s.title.padEnd(38) + String(s.count).padStart(3) + ' cases');
          });
          console.log(l);
          console.log('');
          console.log('  INTEGRATION TEST BREAKDOWN (Stage 2):');
          console.log(l);
          console.log('    POSITIVE (5):');
          e2e.positiveTests.forEach(t => {
            const steps = t.steps.length;
            const vals = t.steps.reduce((s, st) => s + st.validate.length, 0);
            console.log('      ' + t.id.padEnd(7) + t.title.substring(0, 50).padEnd(52) + steps + ' steps / ' + vals + ' checks');
          });
          console.log('    NEGATIVE (5):');
          e2e.negativeTests.forEach(t => {
            const steps = t.steps.length;
            const vals = t.steps.reduce((s, st) => s + st.validate.length, 0);
            console.log('      ' + t.id.padEnd(7) + t.title.substring(0, 50).padEnd(52) + steps + ' steps / ' + vals + ' checks');
          });
          console.log(l);
          console.log('');
          console.log('  TOTALS:');
          console.log('    Automation Test Cases  : ' + automationCases);
          console.log('    Integration Test Cases : ' + e2eCases);
          console.log('    Combined Test Cases    : ' + (automationCases + e2eCases));
          console.log('    Total Steps            : ' + (automationSteps + e2eSteps));
          console.log('    Total Validations      : ' + e2eValidations + ' (integration)');
          console.log('');
          console.log(d);
          if (allPassed) {
            console.log('  PIPELINE STATUS: ALL 5 STAGES PASSED');
          } else {
            console.log('  PIPELINE STATUS: SOME STAGES FAILED — SEE ABOVE');
          }
          console.log(d);

          if (!allPassed) process.exit(1);
          "
