services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: hrms_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-hrms_db}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - hrms_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: hrms_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - hrms_network

  # pgAdmin (Optional - for database management)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: hrms_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@hrms.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - '5050:80'
    depends_on:
      - postgres
    networks:
      - hrms_network

  # Face service (encoding / match for Face Attendance; optional)
  face-service:
    build:
      context: ./face-service
      dockerfile: Dockerfile
    image: face-service:latest
    container_name: hrms_face_service
    restart: unless-stopped
    ports:
      - '8000:8000'
    networks:
      - hrms_network

volumes:
  postgres_data:
  redis_data:

networks:
  hrms_network:
    driver: bridge
